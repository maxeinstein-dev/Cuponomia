services:
  cuponomia:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cuponomia-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xmx512m
    volumes:
      - cuponomia-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  cuponomia-data:
    driver: local
